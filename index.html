<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background: #ffffff;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      width: 320px;
    }
    .login-container h1 {
      margin: 0 0 24px;
      font-size: 24px;
      text-align: center;
      color: #333;
    }
    .login-container label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #555;
    }
    .login-container input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    .login-container button {
      width: 100%;
      padding: 12px;
      border: none;
      background: #4a90e2;
      color: #fff;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .login-container button:hover {
      background: #357ab8;
    }
    .login-container .help {
      margin-top: 16px;
      text-align: center;
      font-size: 13px;
      color: #777;
    }
    .login-container .help a {
      color: #4a90e2;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login</h1>
    <form>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>
      <label for="password">Passcode</label>
      <input type="password" id="password" name="password" placeholder="Enter your passcode" required>
      <button type="submit">Log In</button>
    </form>
    <div class="help">
      <p>Forgot your passcode? <a href="#">Reset it</a></p>
      <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>
    <p>For info click <a href="#">here</a></p>
  </div>
</body>
</html>
